<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock In — markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .page{padding:34px 0 100px;}
  .empty{font-family:var(--mono);font-size:13px;color:var(--muted);padding:22px;border:1px solid var(--line-2);border-radius:14px;background:var(--surface);}

  /* ---- crest logos (drop img/crest/<team-slug>.png; monogram shows until then) ---- */
  .crest{overflow:hidden;position:relative;}
  .crest .crest-logo{width:100%;height:100%;object-fit:contain;padding:7px;}
  .crest.noimg::after{content:attr(data-code);font-family:var(--display);}

  .badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;
    padding:5px 11px;border-radius:20px;text-transform:uppercase;border:1px solid var(--line-2);color:var(--muted);background:var(--surface-2);}
  .badge.neutral{color:var(--muted);}

  /* group headers between card sections */
  .group-label{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:38px 0 14px;}
  .group-label:first-of-type{margin-top:0;}
  .group-label .n{color:var(--accent);}

  /* ---- wallet + toast ---- */
  .wallet-chip{display:inline-flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:11px;padding:9px 14px;font-family:var(--mono);font-size:12px;color:var(--text);}
  .wallet-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .wallet-chip button{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:14px;padding:0 0 0 4px;}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface-2);border:1px solid var(--line-2);
    border-radius:12px;padding:13px 20px;font-family:var(--mono);font-size:12px;color:var(--text);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:100;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark"><img src="img/logo.png" alt="" onerror="this.replaceWith('LOGO')"></span>LOCK&nbsp;IN<span class="bang">!!!</span></a>
    <div class="nav-links">
      <span id="walletArea">
        <button class="btn ghost sm" id="connectBtn" onclick="connectWallet()">Connect wallet</button>
      </span>
    </div>
  </div>
</nav>

<div class="container page">

  <div class="head-row" style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;flex-wrap:wrap;">
    <div>
      <span class="eyebrow"><span class="tick">/</span> Markets</span>
      <h1 class="section-title" style="margin-top:10px;">PICK A MATCH</h1>
    </div>
    <span class="badge neutral" id="listNet">Solana · Devnet</span>
  </div>

  <div id="marketGroups">
    <div class="empty">Loading markets…</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
/* ================= wallet (list page: connect persists via wallet trust) ================= */
let walletPubkey = null;
function getProvider(){
  if (window.phantom?.solana?.isPhantom) return window.phantom.solana;
  if (window.solana?.isPhantom) return window.solana;
  if (window.solflare?.isSolflare) return window.solflare;
  return null;
}
async function connectWallet(){
  const provider = getProvider();
  if (!provider){
    const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
    if(isMobile){
      window.location.href='https://phantom.app/ul/browse/'+encodeURIComponent(window.location.href)+'?ref='+encodeURIComponent(window.location.origin);
      return;
    }
    toast("No Solana wallet detected. Install the Phantom or Solflare extension, unlock it, then reload.");
    return;
  }
  try{
    const resp = await provider.connect();
    walletPubkey = (resp.publicKey ?? provider.publicKey).toString();
    renderWallet();
    toast("Wallet connected — devnet");
  }catch(e){ toast("Connection cancelled."); }
}
function disconnectWallet(){
  getProvider()?.disconnect?.();
  walletPubkey = null;
  document.getElementById('walletArea').innerHTML =
    '<button class="btn ghost sm" id="connectBtn" onclick="connectWallet()">Connect wallet</button>';
}
function renderWallet(){
  const short = walletPubkey.slice(0,4) + "…" + walletPubkey.slice(-4);
  document.getElementById('walletArea').innerHTML =
    `<span class="wallet-chip"><span class="dot"></span>${short}
     <button title="Disconnect" onclick="disconnectWallet()">✕</button></span>`;
}

/* ================= market list ================= */
const FIFA={spain:'ESP',argentina:'ARG',france:'FRA',england:'ENG',germany:'GER',brazil:'BRA',portugal:'POR',netherlands:'NED',croatia:'CRO',switzerland:'SUI',uruguay:'URU',japan:'JPN',morocco:'MAR',mexico:'MEX','united states':'USA',australia:'AUS',wales:'WAL',ireland:'IRL',denmark:'DEN',poland:'POL',senegal:'SEN',ghana:'GHA',cameroon:'CMR',serbia:'SRB',belgium:'BEL',canada:'CAN',ecuador:'ECU',qatar:'QAT','south korea':'KOR','saudi arabia':'KSA','costa rica':'CRC',tunisia:'TUN',iran:'IRN',vietnam:'VIE',myanmar:'MYA','new zealand':'NZL',india:'IND',liechtenstein:'LIE',gibraltar:'GIB',italy:'ITA',scotland:'SCO',austria:'AUT',norway:'NOR',sweden:'SWE',colombia:'COL',chile:'CHI',peru:'PER',nigeria:'NGA',egypt:'EGY',algeria:'ALG'};
const code = s => FIFA[(s||'').trim().toLowerCase()] ?? ((s||'?').replace(/[^A-Za-z0-9]/g,'').slice(0,3).toUpperCase() || '?');
const slug = s => (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
function crestImg(name,extra){
  return `<span class="crest ${extra||''}" data-code="${code(name)}"><img class="crest-logo" src="img/crest/${slug(name)}.svg" alt="" loading="lazy" onerror="if(!this.dataset.p){this.dataset.p=1;this.src='img/crest/${slug(name)}.png';}else{this.closest('.crest').classList.add('noimg');this.remove();}"></span>`;
}
const isDemoMarket = m =>
  /devnet|demo|sample|monitor|test/i.test(m.competition||'') ||
  (Number(m.homeId)===0 && Number(m.awayId)===0);
const stateRank = m => ({live:0,open:1,settled:2,void:3}[marketStateOf(m).cls] ?? 4);
function marketStateOf(m){
  const s = m.state || 'Open';
  if(s==='Settled') return {cls:'settled', label:'Settled'};
  if(s==='Void')    return {cls:'void',    label:'Void'};
  if(s==='Locked'||s==='ScoreValidated'||s==='DistancesComputed'||s==='MedianVerified')
                    return {cls:'live',    label:'In play'};
  return {cls:'open', label:'Open'};
}
function marketCardHTML(m){
  const st=marketStateOf(m);
  const settled = st.cls==='settled' || st.cls==='void';
  const hasScore = m.actualHome!==undefined && m.actualHome!==null;
  const scoreHTML = settled && hasScore
    ? `${m.actualHome}<span class="sep">–</span>${m.actualAway}`
    : `vs`;
  let foot;
  if(st.cls==='open')      foot = `locks in <b data-lock="${m.lockTime||0}">—</b>`;
  else if(st.cls==='live') foot = `in play`;
  else if(st.cls==='void') foot = `void · 0 stakers`;
  else                     foot = `final · proven`;
  const pool = ((m.totalPool||0)/1e6);
  return `<a class="match" href="match.html?id=${m.fixtureId}">
    <div class="match-top">
      <span class="match-comp">${(m.competition||'Match')}</span>
      <span class="pill ${st.cls}"><span class="dot"></span>${st.label}</span>
    </div>
    <div class="match-teams">
      <div class="match-side">${crestImg(m.home)}<span class="tname">${(m.home||'Home')}</span></div>
      <div class="match-score${settled&&hasScore?'':' tbd'}">${scoreHTML}</div>
      <div class="match-side away">${crestImg(m.away)}<span class="tname">${(m.away||'Away')}</span></div>
    </div>
    <div class="match-foot"><span>Pool $${pool.toFixed(pool>=100?0:2)}</span><span class="countdown">${foot}</span></div>
  </a>`;
}

async function loadMarkets(){
  let markets=[];
  try{ const r=await fetch("fixtures.json",{cache:"no-store"}); if(r.ok) markets=(await r.json()).markets??[]; }catch(_){}
  const wrap=document.getElementById('marketGroups');
  markets=markets.filter(m=>!isDemoMarket(m));
  markets.sort((a,b)=>{
    const r=stateRank(a)-stateRank(b); if(r) return r;
    const ka=a.kickoff||(a.lockTime||0)*1000, kb=b.kickoff||(b.lockTime||0)*1000;
    return stateRank(a)<=1 ? ka-kb : kb-ka;
  });
  if(!markets.length){
    wrap.innerHTML='<div class="empty">No live markets yet — the listing agent opens a market automatically as soon as a fixture goes live on the feed.</div>';
    return;
  }
  // group: available (live+open) vs closed (settled+void)
  const avail=markets.filter(m=>stateRank(m)<=1);
  const closed=markets.filter(m=>stateRank(m)>1);
  let html='';
  if(avail.length)
    html+=`<div class="group-label"><span class="n">/</span> Available — stake now (${avail.length})</div>
           <div class="match-grid">${avail.map(marketCardHTML).join('')}</div>`;
  if(closed.length)
    html+=`<div class="group-label"><span class="n">/</span> Closed — settled on-chain (${closed.length})</div>
           <div class="match-grid">${closed.map(marketCardHTML).join('')}</div>`;
  wrap.innerHTML=html;
  updateCardTimers();
}
function updateCardTimers(){
  const now=Math.floor(Date.now()/1000);
  document.querySelectorAll('#marketGroups [data-lock]').forEach(el=>{
    const t=Number(el.dataset.lock); if(!t){el.textContent='—';return;}
    let s=t-now;
    if(s<=0){ el.textContent='locked'; return; }
    const dd=Math.floor(s/86400), hh=Math.floor(s%86400/3600), mm=Math.floor(s%3600/60);
    el.textContent=(dd?dd+'d ':'')+hh+'h '+String(mm).padStart(2,'0')+'m';
  });
}
setInterval(updateCardTimers,30_000);
loadMarkets();

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),3200);
}

/* eager-connect if the wallet already trusts this site */
(async()=>{
  const p=getProvider();
  if(p){ try{ const r=await p.connect({onlyIfTrusted:true}); walletPubkey=(r.publicKey??p.publicKey).toString(); renderWallet(); }catch(_){} }
})();
</script>
</body>
</html>
